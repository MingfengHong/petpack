name: build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
            artifact: windows-x64
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            artifact: macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app,dmg
            artifact: macos-x64
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
            artifact: linux-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential file libayatana-appindicator3-dev libfuse2 libgtk-3-dev \
            librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf xdg-utils
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: npm ci
      - run: npm test
      - uses: tauri-apps/tauri-action@v1
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
        with:
          args: ${{ matrix.args }}
      - uses: actions/upload-artifact@v6
        with:
          name: petpack-studio-${{ matrix.artifact }}
          path: |
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
          if-no-files-found: error
