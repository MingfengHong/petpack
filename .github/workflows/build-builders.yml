name: build lightweight relay builders

on:
  workflow_dispatch:
  push:
    tags: ["builder-v*"]

jobs:
  builder:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --no-bundle
            artifact: windows-x64
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app
            artifact: macos-arm64
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app
            artifact: macos-x64
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --no-bundle
            artifact: linux-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: npm ci
      - run: npm run tauri build -- ${{ matrix.args }} --ci
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
      - name: Stage lightweight builder
        shell: bash
        run: |
          mkdir -p "builder-runtimes/${{ matrix.artifact }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp src-tauri/target/release/petpack-studio.exe "builder-runtimes/${{ matrix.artifact }}/petpack-builder.exe"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            cp -R "src-tauri/target/${{ matrix.target }}/release/bundle/macos/PetPack Studio.app" "builder-runtimes/${{ matrix.artifact }}/PetPack Builder.app"
          else
            cp src-tauri/target/release/petpack-studio "builder-runtimes/${{ matrix.artifact }}/petpack-builder"
            chmod +x "builder-runtimes/${{ matrix.artifact }}/petpack-builder"
          fi
      - name: Archive Windows builder
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "builder-runtimes/${{ matrix.artifact }}" -DestinationPath "petpack-builder-${{ matrix.artifact }}.zip"
      - name: Archive macOS/Linux builder
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "petpack-builder-${{ matrix.artifact }}.tar.gz" -C builder-runtimes "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v6
        with:
          name: petpack-builder-${{ matrix.artifact }}
          path: petpack-builder-${{ matrix.artifact }}.*
          if-no-files-found: error
